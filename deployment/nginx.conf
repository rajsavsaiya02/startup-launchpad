server {
    listen 80;
    listen [::]:80;
    
    # Optional: If you own a domain name later on, replace this with your domain.
    # Otherwise, an underscore acts as a catch-all for the IP address.
    server_name _; 

    # Where Nginx should find the built React frontend files
    root /var/www/startup-launchpad/client;

    # What file to serve as the default
    index index.html;

    # General logging configuration
    access_log /var/log/nginx/startup-launchpad.access.log;
    error_log /var/log/nginx/startup-launchpad.error.log;

    # 1. FRONTEND: Catch all routes and pass to the index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. BACKEND API: Reverse Proxy to PM2 Node.js process (Port 5000)
    location /api/ {
        proxy_pass http://localhost:5000/; # Assumes your Node app runs on 5000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Ensure exact IP tracking for logging logic in Node app
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Cache control for static assets (images, css, js) generated by Vite
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }
}
